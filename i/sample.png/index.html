<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Vault</title>
  <link rel="icon" href="../../assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
  <main class="wrap">
    <section class="card image-card" aria-label="locked image">
      <a id="listLink" class="back-link" href="../" aria-label="back to list">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
        <span>list</span>
      </a>

      <div class="lock" aria-hidden="true">
        <svg viewBox="0 0 64 64">
          <path d="M20 28v-8a12 12 0 0 1 24 0v8"></path>
          <rect x="14" y="28" width="36" height="28" rx="8"></rect>
          <circle cx="32" cy="41" r="4"></circle>
          <path d="M32 45v5"></path>
        </svg>
      </div>

      <form id="form" class="form" autocomplete="off">
        <input
          id="password"
          class="password"
          type="password"
          placeholder="password"
          autocomplete="current-password"
          autofocus
        >
        <button id="button" class="button" type="submit">open</button>
      </form>

      <p id="status" class="status"></p>

      <div id="viewer" class="viewer" hidden>
        <img id="image" alt="restored image">

        <div class="viewer-actions">
          <button id="retry" class="download secondary" type="button">retry</button>
          <a id="openImage" class="download secondary" href="#" target="_blank" rel="noopener">open</a>
          <button id="download" class="download" type="button">download</button>
        </div>
      </div>

      <nav class="corner-links" aria-label="site links">
        <a class="corner-button" href="../../README.md/" aria-label="README">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5.5A2.5 2.5 0 0 1 7.5 3H20v16H7.5A2.5 2.5 0 0 0 5 21.5v-16z"></path>
            <path d="M5 5.5A2.5 2.5 0 0 0 2.5 3H2v16h.5A2.5 2.5 0 0 1 5 21.5"></path>
          </svg>
        </a>

        <a id="repoLink" class="corner-button" href="https://github.com/" target="_blank" rel="noopener" aria-label="repository">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 18.5c-3 .8-3-1.5-4.2-2"></path>
            <path d="M16 22v-3.9a3.4 3.4 0 0 0-.9-2.6c3-.3 6.1-1.5 6.1-6.6a5.2 5.2 0 0 0-1.4-3.6 4.8 4.8 0 0 0-.1-3.6s-1.1-.3-3.7 1.4a12.5 12.5 0 0 0-6.7 0C6.7 1.4 5.6 1.7 5.6 1.7a4.8 4.8 0 0 0-.1 3.6A5.2 5.2 0 0 0 4.1 9c0 5.1 3.1 6.3 6.1 6.6a3 3 0 0 0-.8 1.9V22"></path>
          </svg>
        </a>
      </nav>
    </section>
  </main>

  <script>
    (() => {
      const link = document.getElementById("repoLink");
      if (!link) return;

      const host = location.hostname;

      if (!host.endsWith(".github.io")) {
        return;
      }

      const owner = host.replace(/\.github\.io$/, "");
      const parts = location.pathname.split("/").filter(Boolean);

      const repo =
        parts[0] &&
        parts[0] !== "i" &&
        parts[0] !== "README.md"
          ? parts[0]
          : `${owner}.github.io`;

      link.href = `https://github.com/${owner}/${repo}`;
    })();
  </script>

  <script src="../../assets/script.js"></script>
</body>
</html>
